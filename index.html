<html lang="fr">

<body class="page">

<div class="app-container">
    
  <div class="floating-search" id="searchContainer">
    <button class="search-icon-btn" id="searchToggleBtn" aria-label="Ouvrir la recherche">
      <svg viewBox="0 0 24 24"><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path></svg>
    </button>
    <input placeholder="Rechercher une province" type="search" class="search-input" id="searchProvince">
    <ul id="search-suggestions" class="search-suggestions"></ul>
  </div>

  <div class="app-body">
    <aside class="app-sidebar-left" id="ficheInfo">
  
  <button id="retourCarte" class="btn-retour fiche-anim delay-1">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    Retour à la carte
  </button>

  <div class="fiche-header fiche-anim delay-2">
    <span class="fiche-region-badge" id="ficheRegion">Région</span>
    <h2 id="ficheTitre">Nom Province</h2>
  </div>

  <div class="fiche-stats-grid fiche-anim delay-3">
    <div class="stat-card">
      <span class="stat-icon">🏛️</span>
      <div class="stat-info">
        <span class="stat-label">Capitale</span>
        <strong id="ficheCapitale" class="stat-value">...</strong>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">👥</span>
      <div class="stat-info">
        <span class="stat-label">Population</span>
        <strong id="fichePop" class="stat-value">...</strong>
      </div>
    </div>
  </div>

  <div class="fiche-content fiche-anim delay-4">
    <h3>À propos</h3>
    <p id="ficheTexte">Chargement des données...</p>
  </div>

</aside>
